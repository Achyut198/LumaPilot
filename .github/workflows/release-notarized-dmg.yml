name: release-notarized-dmg

on:
  push:
    tags:
      - "v*"

jobs:
  build-sign-notarize-release:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      HAS_NOTARIZATION_SECRETS: ${{ secrets.BUILD_CERTIFICATE_BASE64 != '' && secrets.P12_PASSWORD != '' && secrets.KEYCHAIN_PASSWORD != '' && secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.DEVELOPER_ID_APP_IDENTITY != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Prepare keychain and import Developer ID cert
        if: env.HAS_NOTARIZATION_SECRETS == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Configure notarytool profile
        if: env.HAS_NOTARIZATION_SECRETS == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "lumapilot-notary" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Build notarized DMG
        if: env.HAS_NOTARIZATION_SECRETS == 'true'
        env:
          VERSION: ${{ github.ref_name }}
          DEVELOPER_ID_APP: ${{ secrets.DEVELOPER_ID_APP_IDENTITY }}
          NOTARY_PROFILE: lumapilot-notary
        run: |
          chmod +x ./scripts/macos_notarized_release.sh
          ./scripts/macos_notarized_release.sh

      - name: Build unsigned DMG fallback
        if: env.HAS_NOTARIZATION_SECRETS != 'true'
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          APP_PATH="build/Build/Products/Release/LumaPilot.app"
          STAGE_DIR="$RUNNER_TEMP/LumaPilotDMG"
          DIST_DIR="dist"

          xcodebuild \
            -project LumaPilot.xcodeproj \
            -scheme LumaPilot \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            build

          codesign --force --deep --sign - --entitlements LumaPilot/LumaPilot.entitlements "$APP_PATH"

          rm -rf "$STAGE_DIR"
          mkdir -p "$STAGE_DIR" "$DIST_DIR"
          cp -R "$APP_PATH" "$STAGE_DIR/LumaPilot.app"
          ln -s /Applications "$STAGE_DIR/Applications"

          hdiutil create \
            -volname "LumaPilot Installer" \
            -srcfolder "$STAGE_DIR" \
            -ov \
            -format UDZO \
            "$DIST_DIR/LumaPilot-${VERSION}-macOS.dmg"

          shasum -a 256 "$DIST_DIR/LumaPilot-${VERSION}-macOS.dmg" > "$DIST_DIR/LumaPilot-${VERSION}-macOS.dmg.sha256"

      - name: Upload DMG and checksum to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          if [ -f "RELEASES/${VERSION}.md" ]; then
            gh release create "$VERSION" \
              --title "LumaPilot ${VERSION}" \
              --notes-file "RELEASES/${VERSION}.md" || true
          else
            gh release create "$VERSION" \
              --title "LumaPilot ${VERSION}" \
              --notes "Automated notarized release ${VERSION}" || true
          fi

          gh release upload "$VERSION" \
            "dist/LumaPilot-${VERSION}-macOS.dmg" \
            "dist/LumaPilot-${VERSION}-macOS.dmg.sha256" \
            --clobber
